server:
  port: 8080
  servlet:
    context-path: /

spring:
  application:
    name: COLLABERA_LIBRARY_MANAGEMENT_SYSTEM
  profiles:
    active: dev

  datasource:
    url: jdbc:h2:mem:mydb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: password
    driver-class-name: org.h2.Driver
    hikari:
      pool-name: HikariLibraryPool
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000
      leak-detection-threshold: 2000
      auto-commit: true
      read-only: false

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: none
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    defer-datasource-initialization: true

  redis:
    host: localhost
    port: 6379
    password: null
    timeout: 2000
    database: 0
    ssl: false
    lettuce:
      pool:
        max-active: 8
        max-wait: -1ms
        min-idle: 0
        max-idle: 8


  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
    connect-retries: 3

  springdoc:
    api-docs:
      path: /v3/api-docs
    swagger-ui:
      path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,beans, metrics,env,loggers,threaddump,heapdump
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: Library Management System
    version: 1.0.0
    description: Spring Boot Library API